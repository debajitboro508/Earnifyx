<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="https://pl29211880.profitablecpmratenetwork.com/6c/eb/7c/6ceb7cce01d79f2acaf9e9cdce1cad80.js"></script>
    <script src="https://pl29211883.profitablecpmratenetwork.com/66/eb/56/66eb56200857fc2d4bc3226cb621ea67.js"></script>

    <title>Earnifyx | Tech Empire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Outfit', sans-serif; background: #020617; color: white; min-height: 100vh; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; transition: 0.3s; }
        .simple-input { background: #0f172a; border: 1px solid #1e293b; color: white; padding: 16px; border-radius: 16px; width: 100%; outline: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideIn 0.4s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .nav-btn { color: #64748b; font-size: 10px; font-weight: 900; transition: 0.3s; text-transform: uppercase; }
        .nav-active { color: #6366f1; transform: translateY(-3px); }
        #adWrapper { display: none; position: fixed; inset: 0; background: #000; z-index: 99999; flex-direction: column; }
        #adWrapper.active { display: flex; }
        .close-x { background: #ef4444; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 24px; border: 4px solid #7f1d1d; box-shadow: 0 0 15px rgba(239, 68, 68, 0.5); }
        /* Adsterra banner fixed at bottom */
        .bottom-ad-container { position: fixed; bottom: 85px; left: 0; right: 0; z-index: 40; display: flex; justify-content: center; background: rgba(2, 6, 23, 0.9); padding: 5px; backdrop-filter: blur(10px); }
    </style>
</head>
<body class="pb-64">

    <div id="adWrapper">
        <div class="bg-slate-900 p-4 flex justify-between items-center border-b border-white/10">
            <div class="flex flex-col">
                <span class="text-[10px] font-black text-indigo-400 uppercase italic">Verification Node</span>
                <span id="adTimerSec" class="text-sm font-bold text-red-500 italic">Connecting</span>
            </div>
            <div id="adActionArea"></div>
        </div>
        <iframe id="adIframe" class="flex-grow w-full border-none bg-white"></iframe>
    </div>

    <div id="mainApp" class="hidden">
        <header class="p-8 flex justify-between items-center border-b border-white/5 sticky top-0 bg-black/50 backdrop-blur-md z-50">
            <div><h2 id="welcomeUser" class="text-xl font-black italic">---</h2><div class="text-[9px] font-bold text-indigo-400 uppercase mt-1 italic">Rank: Bronze</div></div>
            <div class="glass px-5 py-2 border-indigo-500/30 text-right"><p class="text-[9px] font-bold text-indigo-400 uppercase">Vault</p><span id="balance" class="text-xl font-black text-white">0</span></div>
        </header>

        <div id="home" class="tab-content active p-6 space-y-4 max-w-lg mx-auto">
            <div class="glass p-5 border-l-4 border-indigo-500 flex justify-between items-center bg-indigo-500/5">
                <p class="font-black text-sm text-indigo-400 italic uppercase">Daily Target</p>
                <p id="dailyAdProgress" class="text-xl font-black text-white">0/40</p>
            </div>
            
            <div id="taskList" class="grid grid-cols-1 gap-4"></div>
        </div>

        <div id="leaderboard" class="tab-content p-6 max-w-lg mx-auto">
            <h3 class="text-center font-black italic text-xl text-indigo-500 uppercase mb-6">World Rankings 🏆</h3>
            <div id="leaderList" class="space-y-3"></div>
        </div>

        <div id="wallet" class="tab-content p-6 text-center max-w-lg mx-auto">
            <div class="glass py-16 bg-indigo-600/10"><h2 class="text-6xl font-black italic text-white">₹<span id="cashVal">0</span></h2></div>
            <div id="withdrawSection" class="mt-8 space-y-4"></div>
        </div>

        <div id="profile" class="tab-content p-6 max-w-lg mx-auto">
            <div class="glass p-8 space-y-5">
                <p class="text-xs font-bold text-slate-500 uppercase">Profile Settings</p>
                <input type="text" id="pUPI" placeholder="UPI ID (e.g. name@upi)" class="simple-input">
                <button onclick="saveProfile()" class="w-full bg-indigo-600 p-4 rounded-xl font-bold uppercase italic transition active:scale-95">Save Details</button>
                <button onclick="logout()" class="w-full text-red-500 font-bold uppercase mt-12 underline italic">Terminate Session</button>
            </div>
        </div>
    </div>

    <div class="bottom-ad-container">
        <script type="text/javascript">
          atOptions = { 'key' : '2783e5b5e9656ec03b87289848eba5e4', 'format' : 'iframe', 'height' : 60, 'width' : 468, 'params' : {} };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/2783e5b5e9656ec03b87289848eba5e4/invoke.js"></script>
    </div>

    <nav id="navBar" class="hidden fixed bottom-6 left-6 right-6 glass bg-black/90 border-white/10 p-5 flex justify-around items-center z-50 backdrop-blur-xl">
        <button onclick="switchTab('home')" id="btn-home" class="nav-btn nav-active">HOME</button>
        <button onclick="switchTab('leaderboard')" id="btn-leaderboard" class="nav-btn">RANK</button>
        <button onclick="switchTab('wallet')" id="btn-wallet" class="nav-btn">WALLET</button>
        <button onclick="switchTab('profile')" id="btn-profile" class="nav-btn">IDENT</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, collection, getDocs, updateDoc, increment, runTransaction, orderBy, query, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZ8MsMjt-dhXjY-fyYYtOs-X6UmvLAV3I",
            authDomain: "earnifyx-7d00a.firebaseapp.com",
            projectId: "earnifyx-7d00a",
            storageBucket: "earnifyx-7d00a.firebasestorage.app",
            messagingSenderId: "566816125641",
            appId: "1:566816125641:web:7258a20b6fcb119b985318"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userData = {}, activeReward = 0, activeTaskId = "", currentTimer = null;

        onAuthStateChanged(auth, (u) => { 
            if(u){ 
                sync(u.uid); 
                document.getElementById('mainApp').classList.remove('hidden'); 
                document.getElementById('navBar').classList.remove('hidden'); 
            } else {
                window.location.href = "login.html"; // Redirect if not logged in
            }
        });

        function sync(uid) {
            onSnapshot(doc(db, "users", uid), (d) => {
                if(d.exists()){
                    userData = d.data();
                    document.getElementById('balance').innerText = userData.coins || 0;
                    document.getElementById('cashVal').innerText = Math.floor((userData.coins || 0) / 100);
                    document.getElementById('welcomeUser').innerText = userData.username;
                    document.getElementById('pUPI').value = userData.pUPI || "";
                    
                    const wSec = document.getElementById('withdrawSection');
                    if(userData.lastWithdrawDate === new Date().toDateString()) {
                        wSec.innerHTML = `<p class="glass p-4 text-[10px] text-slate-500 font-bold uppercase italic">Next Withdrawal Available Tomorrow</p>`;
                    } else {
                        wSec.innerHTML = `<button onclick="handleWithdraw(2000)" class="w-full glass p-5 flex justify-between items-center border-indigo-500/20"><span class="font-bold">Withdraw ₹20</span><span class="text-indigo-400 font-black">2000 🪙</span></button>`;
                    }
                    renderAllAds();
                }
            });
        }

        async function renderAllAds() {
            const list = document.getElementById('taskList'), today = new Date().toDateString(), logs = userData.taskLogs?.[today] || {};
            let html = "";
            
            // Collections to fetch from
            const sets = ["main_ads", "tasks"];
            for (const s of sets) {
                const snap = await getDocs(collection(db, s));
                snap.forEach(t => {
                    if((logs[t.id] || 0) < 2) {
                        const isPrem = s === "main_ads";
                        html += `
                        <div class="glass p-6 flex justify-between items-center border border-indigo-500/20">
                            <div>
                                <p class="${isPrem ? 'text-indigo-400' : 'text-green-400'} text-[9px] font-black uppercase italic">${isPrem ? 'Premium Node' : 'Standard Node'}</p>
                                <p class="font-black text-sm italic">+${t.data().reward} CR</p>
                            </div>
                            <button onclick="startAdFlow('${t.data().reward}', '${t.data().link}', '${t.id}', '${isPrem ? 'premium' : 'task'}')" class="bg-indigo-600 text-white px-6 py-2 rounded-xl text-[10px] font-black uppercase italic shadow-lg">Run</button>
                        </div>`;
                    }
                });
            }
            list.innerHTML = html || `<p class="text-center text-slate-500 uppercase font-black py-10 italic">All nodes synchronized!</p>`;
        }

        window.startAdFlow = (reward, link, taskId, type) => {
            activeReward = parseInt(reward); activeTaskId = taskId;
            document.getElementById('adIframe').src = link;
            document.getElementById('adWrapper').classList.add('active');
            
            // TIMER: Premium = 180s (3m), Task = 50s
            let t = (type === 'premium') ? 180 : 50;
            
            if(currentTimer) clearInterval(currentTimer);
            document.getElementById('adActionArea').innerHTML = ""; // Clear button
            
            currentTimer = setInterval(() => {
                t--; 
                document.getElementById('adTimerSec').innerText = "VERIFYING: " + t + "s";
                if(t <= 0){ 
                    clearInterval(currentTimer); 
                    document.getElementById('adActionArea').innerHTML = `<button onclick="finishTaskAndPay()" class="close-x">✕</button>`; 
                }
            }, 1000);
        };

        window.finishTaskAndPay = async () => {
            const userRef = doc(db, "users", auth.currentUser.uid), today = new Date().toDateString();
            await runTransaction(db, async (t) => {
                const snap = await t.get(userRef);
                let logs = snap.data().taskLogs || {}; if(!logs[today]) logs[today] = {};
                logs[today][activeTaskId] = (logs[today][activeTaskId] || 0) + 1;
                t.update(userRef, { 
                    coins: increment(activeReward), 
                    taskLogs: logs,
                    totalAdsWatched: increment(1) 
                });
            });
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            document.getElementById('adWrapper').classList.remove('active');
            document.getElementById('adIframe').src = "";
        };

        window.switchTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('nav-active');
            if(id === 'leaderboard') fetchLeaderboard();
        };

        async function fetchLeaderboard() {
            const q = query(collection(db, "users"), orderBy("coins", "desc"), limit(10));
            const snap = await getDocs(q);
            let html = "";
            snap.forEach((u, i) => {
                html += `<div class="glass p-5 flex justify-between items-center"><span class="font-black italic text-indigo-400">#${i+1}</span><p class="text-sm font-bold uppercase">${u.data().username}</p><p class="font-black text-xs">${u.data().coins} CR</p></div>`;
            });
            document.getElementById('leaderList').innerHTML = html;
        }

        window.saveProfile = async () => {
            const upi = document.getElementById('pUPI').value;
            if(!upi) return alert("Enter UPI ID");
            await updateDoc(doc(db, "users", auth.currentUser.uid), { pUPI: upi });
            alert("Profile Synced! ✅");
        };

        window.logout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
