<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earnifyx | Tech Empire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #020617; color: white; min-height: 100vh; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; transition: 0.3s; }
        .simple-input { background: #0f172a; border: 1px solid #1e293b; color: white; padding: 16px; border-radius: 16px; width: 100%; outline: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideIn 0.4s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .nav-btn { color: #64748b; font-size: 10px; font-weight: 900; transition: 0.3s; }
        .nav-active { color: #6366f1; transform: translateY(-3px); }
        
        /* --- RANKING ANIMATIONS --- */
        .rank-card { position: relative; overflow: hidden; }
        .rank-1 { border: 2px solid #fbbf24 !important; background: linear-gradient(145deg, rgba(251, 191, 36, 0.2), transparent) !important; box-shadow: 0 0 20px rgba(251, 191, 36, 0.4); }
        .rank-2 { border: 2px solid #cbd5e1 !important; background: linear-gradient(145deg, rgba(203, 213, 225, 0.1), transparent) !important; box-shadow: 0 0 15px rgba(203, 213, 225, 0.2); }
        .rank-3 { border: 2px solid #d97706 !important; background: linear-gradient(145deg, rgba(217, 119, 6, 0.1), transparent) !important; box-shadow: 0 0 10px rgba(217, 119, 6, 0.2); }
        
        #adWrapper { display: none; position: fixed; inset: 0; background: #000; z-index: 99999; flex-direction: column; }
        #adWrapper.active { display: flex; }
        .close-x { background: #ef4444; color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 18px; border: none; }
        .notice-glow { background: rgba(99, 102, 241, 0.1); border-bottom: 1px solid rgba(99, 102, 241, 0.2); }
    </style>
</head>
<body class="pb-32">

    <div id="maintScreen" class="hidden fixed inset-0 bg-slate-950 z-[100000] flex flex-col items-center justify-center p-10 text-center">
        <h1 class="text-4xl font-black italic text-indigo-500 mb-4 uppercase">System Offline</h1>
        <p class="text-slate-400 text-sm font-bold uppercase tracking-[3px]">Maintenance Active. Back soon!</p>
    </div>

    <div id="adWrapper">
        <div class="bg-slate-900/90 p-4 flex justify-between items-center border-b border-white/10">
            <div class="flex flex-col">
                <span class="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Verification Node</span>
                <span id="timerText" class="text-sm font-bold text-white">Status: <span id="adTimerSec" class="text-red-500 italic">Connecting</span></span>
            </div>
            <div id="adActionArea"></div>
        </div>
        <iframe id="adIframe" class="flex-grow w-full border-none bg-white"></iframe>
    </div>

    <div id="authScreen" class="flex flex-col justify-center min-h-screen p-8 max-w-md mx-auto text-center">
        <div class="p-8 glass">
            <h1 class="text-5xl font-black italic mb-2 text-indigo-500 uppercase">Earnifyx</h1>
            <p class="text-[10px] text-slate-500 font-bold tracking-[4px] mb-10 uppercase italic">Digital Empire</p>
            <div class="space-y-4 text-left">
                <input type="text" id="username" placeholder="Full Name" class="simple-input">
                <input type="email" id="email" placeholder="Email Address" class="simple-input">
                <input type="password" id="pass" placeholder="Password" class="simple-input">
                <input type="text" id="refBy" placeholder="Referral Code" class="simple-input">
            </div>
            <button onclick="handleAuth()" class="w-full bg-indigo-600 p-4 rounded-2xl font-black uppercase text-xs mt-8 transition active:scale-95">Initialize</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <div id="noticeBar" class="hidden notice-glow p-3 text-center sticky top-0 z-[60] backdrop-blur-md">
            <p id="noticeText" class="text-[10px] font-black text-indigo-400 uppercase tracking-widest animate-pulse"></p>
        </div>

        <header class="p-8 flex justify-between items-center border-b border-white/5 sticky top-0 bg-black/50 backdrop-blur-md z-50">
            <div><h2 id="welcomeUser" class="text-xl font-black italic text-white">---</h2><div class="text-[9px] font-bold text-indigo-400 uppercase tracking-widest mt-1 italic">Rank: Bronze</div></div>
            <div class="glass px-5 py-2 border-indigo-500/30 text-right"><p class="text-[9px] font-bold text-indigo-400 uppercase">Vault</p><span id="balance" class="text-xl font-black">0</span></div>
        </header>

        <div id="home" class="tab-content active p-6 space-y-4 max-w-lg mx-auto">
            <div class="glass p-5 border-l-4 border-green-500 flex justify-between items-center bg-green-500/5">
                <div><p class="font-bold text-sm text-green-400 italic">Daily Bonus</p><p class="text-[10px] text-slate-400 uppercase">Collect 50 Coins</p></div>
                <button onclick="claimDailyBonus()" class="bg-green-600 text-black px-5 py-2 rounded-xl text-[10px] font-black uppercase">Claim</button>
            </div>
            <div id="taskList" class="grid grid-cols-1 gap-4"></div>
        </div>

        <div id="leaderboard" class="tab-content p-6 space-y-4 max-w-lg mx-auto">
            <h3 class="text-center font-black italic text-xl text-indigo-500 uppercase mb-6">World Rankings 🏆</h3>
            <div id="leaderList" class="space-y-3"></div>
        </div>

        <div id="wallet" class="tab-content p-6 space-y-6 max-w-lg mx-auto text-center">
            <div class="glass py-16 bg-gradient-to-b from-indigo-600/10 to-transparent"><p class="text-[10px] text-slate-400 uppercase font-bold mb-4 tracking-widest">Balance</p><h2 class="text-7xl font-black italic">₹<span id="cashVal">0</span></h2></div>
            <button onclick="shareInvite()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold text-[10px] uppercase shadow-lg">Invite Friends 🚀</button>
            <div id="withdrawSection" class="space-y-3 text-left"></div>
        </div>

        <div id="profile" class="tab-content p-6 max-w-lg mx-auto">
            <div class="glass p-8 space-y-5">
                <input type="text" id="pName" placeholder="Name" class="simple-input">
                <input type="text" id="pPin" placeholder="Pin" class="simple-input">
                <input type="text" id="pUPI" placeholder="UPI ID" class="simple-input">
                <button onclick="saveProfile()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold uppercase">Save Settings</button>
            </div>
            <button onclick="logout()" class="w-full mt-10 text-red-500 font-bold text-xs uppercase underline">Logout System</button>
        </div>
    </div>

    <nav id="navBar" class="hidden fixed bottom-6 left-6 right-6 glass bg-black/90 border-white/10 p-5 flex justify-around items-center z-50">
        <button onclick="switchTab('home')" id="btn-home" class="nav-btn nav-active">HOME</button>
        <button onclick="switchTab('leaderboard')" id="btn-leaderboard" class="nav-btn">RANK</button>
        <button onclick="switchTab('wallet')" id="btn-wallet" class="nav-btn">WALLET</button>
        <button onclick="switchTab('profile')" id="btn-profile" class="nav-btn">IDENT</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, updateDoc, increment, getDocs, query, orderBy, limit, getDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZ8MsMjt-dhXjY-fyYYtOs-X6UmvLAV3I",
            authDomain: "earnifyx-7d00a.firebaseapp.com",
            projectId: "earnifyx-7d00a",
            storageBucket: "earnifyx-7d00a.firebasestorage.app",
            messagingSenderId: "566816125641",
            appId: "1:566816125641:web:7258a20b6fcb119b985318"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let activeReward = 0, activeTaskId = "", userData = {}, currentTimer = null;

        // Capture Referral from URL
        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.get('ref')) document.getElementById('refBy').value = urlParams.get('ref');
        });

        window.startAdFlow = (reward, link, taskId, type) => {
            if(userData.isBlocked) return alert("ACCOUNT BLOCKED!");
            activeReward = parseInt(reward); activeTaskId = taskId;
            document.getElementById('adIframe').src = link;
            document.getElementById('adWrapper').classList.add('active');
            const actionArea = document.getElementById('adActionArea');
            const statusLabel = document.getElementById('adTimerSec');
            actionArea.innerHTML = ""; if(currentTimer) clearInterval(currentTimer);
            let t = (type === 'premium') ? 180 : 50; 
            statusLabel.innerText = "Wait " + t + "s";
            currentTimer = setInterval(() => {
                t--; statusLabel.innerText = "Wait " + t + "s";
                if(t <= 0){ 
                    clearInterval(currentTimer); statusLabel.innerText = "Verified!";
                    actionArea.innerHTML = `<button onclick="finishTaskAndPay()" class="close-x">✕</button>`; 
                }
            }, 1000);
        };

        window.finishTaskAndPay = async () => {
            const uid = auth.currentUser.uid;
            const refUser = doc(db, "users", uid);
            const today = new Date().toDateString();
            
            // --- NEW REFERRAL REWARD LOGIC ---
            let isReferralComplete = false;
            if((userData.totalAdsWatched + 1) === 10 && userData.referredBy && !userData.refRewardSent) {
                isReferralComplete = true;
            }

            try {
                await runTransaction(db, async (transaction) => {
                    const userSnap = await transaction.get(refUser);
                    let logs = userSnap.data().taskLogs || {};
                    if(!logs[today]) logs[today] = {};
                    logs[today][activeTaskId] = (logs[today][activeTaskId] || 0) + 1;

                    transaction.update(refUser, { 
                        coins: increment(activeReward), 
                        taskLogs: logs, 
                        totalAdsWatched: increment(1) 
                    });

                    // Agar 10 ads poore hue, toh refer karne wale ko 1000 coins do
                    if(isReferralComplete) {
                        const bossRef = doc(db, "users", userData.referredBy);
                        transaction.update(bossRef, { coins: increment(1000) });
                        transaction.update(refUser, { refRewardSent: true });
                    }
                });

                if(isReferralComplete) alert("🎉 Referral Milestone! Your inviter received 1000 CR!");
                confetti({ particleCount: 150, origin: { y: 0.7 } });
                document.getElementById('adWrapper').classList.remove('active');
            } catch (e) { alert("Error updating reward!"); }
        };

        onAuthStateChanged(auth, (u) => { if(u){ sync(u.uid); document.getElementById('authScreen').classList.add('hidden'); document.getElementById('mainApp').classList.remove('hidden'); document.getElementById('navBar').classList.remove('hidden'); } });

        function sync(uid) {
            onSnapshot(doc(db, "settings", "config"), (d) => {
                if(d.exists()) {
                    const c = d.data();
                    if(c.maintenance) document.getElementById('maintScreen').classList.remove('hidden'); else document.getElementById('maintScreen').classList.add('hidden');
                    if(c.notice) { document.getElementById('noticeBar').classList.remove('hidden'); document.getElementById('noticeText').innerText = c.notice; } else { document.getElementById('noticeBar').classList.add('hidden'); }
                }
            });
            onSnapshot(doc(db, "users", uid), (d) => {
                if(d.exists()){
                    userData = d.data();
                    if(userData.isBlocked) { logout(); return; }
                    document.getElementById('balance').innerText = userData.coins || 0;
                    document.getElementById('cashVal').innerText = Math.floor((userData.coins || 0) / 100);
                    document.getElementById('welcomeUser').innerText = userData.username;
                    document.getElementById('pName').value = userData.username;
                    document.getElementById('pPin').value = userData.pPin || "";
                    document.getElementById('pUPI').value = userData.pUPI || "";
                    
                    const wSec = document.getElementById('withdrawSection');
                    if(userData.lastWithdrawDate === new Date().toDateString()) wSec.innerHTML = `<div class="glass p-5 text-[10px] text-slate-500 uppercase font-black italic">Daily Limit Reached</div>`;
                    else wSec.innerHTML = `<button onclick="handleWithdraw(2000)" class="w-full glass p-5 flex justify-between items-center"><span class="font-bold">Withdraw ₹20</span><span class="font-black text-indigo-400">2000 🪙</span></button>`;
                    renderAll();
                }
            });
        }

        async function fetchLeaderboard() {
            const q = query(collection(db, "users"), orderBy("coins", "desc"), limit(10));
            const snap = await getDocs(q);
            let html = "", rank = 1;
            snap.forEach(u => {
                let rankClass = (rank === 1) ? "rank-1" : (rank === 2) ? "rank-2" : (rank === 3) ? "rank-3" : "";
                html += `<div class="glass p-5 flex justify-between items-center rank-card ${rankClass}"><div class="flex items-center gap-4"><span class="font-black italic text-indigo-400">#${rank}</span><p class="text-sm font-bold">${u.data().username}</p></div><p class="font-black text-xs text-indigo-300">${u.data().coins} 🪙</p></div>`;
                rank++;
            });
            document.getElementById('leaderList').innerHTML = html;
        }

        async function renderAll() {
            const list = document.getElementById('taskList'), today = new Date().toDateString(), logs = userData.taskLogs?.[today] || {};
            let html = "";
            const mSnap = await getDocs(collection(db, "main_ads"));
            mSnap.forEach(t => { if((logs[t.id] || 0) < 2) html += `<div class="glass p-6 flex justify-between items-center"><div><p class="text-indigo-400 text-[9px] font-black uppercase">Premium</p><p class="font-black text-sm text-white">+${t.data().reward} CR</p></div><button onclick="startAdFlow('${t.data().reward}', '${t.data().link}', '${t.id}', 'premium')" class="bg-indigo-600 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase italic">Run Ad</button></div>`; });
            const tSnap = await getDocs(collection(db, "tasks"));
            tSnap.forEach(t => { if((logs[t.id] || 0) < 2) html += `<div class="glass p-6 flex justify-between items-center"><div><p class="text-slate-500 text-[9px] font-black uppercase">Task Node</p><p class="font-black text-sm uppercase text-white">${t.data().title}</p></div><button onclick="startAdFlow('${t.data().reward}', '${t.data().link}', '${t.id}', 'task')" class="bg-white text-black px-5 py-2 rounded-xl text-[10px] font-black uppercase">Start</button></div>`; });
            list.innerHTML = html || `<p class="text-center text-slate-500 text-[10px] uppercase font-bold">No tasks available</p>`;
        }

        window.handleWithdraw = async (amt) => {
            if(!userData.pUPI) return alert("Save UPI ID first!");
            await addDoc(collection(db, "withdrawals"), { uid: auth.currentUser.uid, username: userData.username, amt, upi: userData.pUPI, status: "pending", date: new Date().toLocaleString() });
            await updateDoc(doc(db, "users", auth.currentUser.uid), { coins: increment(-amt), lastWithdrawDate: new Date().toDateString() });
            alert("Withdrawal Requested!");
        };

        window.handleAuth = async () => {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value, u = document.getElementById('username').value, r = document.getElementById('refBy').value;
            if(!e || !p || !u) return alert("Please fill all fields!");
            try {
                const rs = await createUserWithEmailAndPassword(auth, e, p);
                await setDoc(doc(db, "users", rs.user.uid), { username: u, email: e, coins: 100, taskLogs: {}, isBlocked: false, lastWithdrawDate: "", totalAdsWatched: 0, referredBy: r || null, refRewardSent: false });
            } catch { signInWithEmailAndPassword(auth, e, p).catch(() => alert("Auth Error!")); }
        };

        window.shareInvite = () => { 
            const link = `${window.location.origin}${window.location.pathname}?ref=${auth.currentUser.uid}`;
            navigator.clipboard.writeText(link); alert("Referral Link Copied! Send to friends."); 
        };

        window.switchTab = (id) => { 
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-'+id).classList.add('nav-active');
            if(id === 'leaderboard') fetchLeaderboard();
        };

        window.claimDailyBonus = async () => { 
            if(userData.lastBonusDate === new Date().toDateString()) return alert("Already claimed today!");
            await updateDoc(doc(db, "users", auth.currentUser.uid), { coins: increment(50), lastBonusDate: new Date().toDateString() });
            alert("50 CR Bonus Added!");
        };

        window.saveProfile = async () => { await updateDoc(doc(db, "users", auth.currentUser.uid), { username: document.getElementById('pName').value, pPin: document.getElementById('pPin').value, pUPI: document.getElementById('pUPI').value }); alert("Profile Saved!"); };
        window.logout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
