<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="https://pl29211880.profitablecpmratenetwork.com/6c/eb/7c/6ceb7cce01d79f2acaf9e9cdce1cad80.js"></script>
    <script src="https://pl29211883.profitablecpmratenetwork.com/66/eb/56/66eb56200857fc2d4bc3226cb621ea67.js"></script>

    <title>Earnifyx | Tech Empire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Outfit', sans-serif; background: #020617; color: white; min-height: 100vh; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; transition: 0.3s; }
        .simple-input { background: #0f172a; border: 1px solid #1e293b; color: white; padding: 16px; border-radius: 16px; width: 100%; outline: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideIn 0.4s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .nav-btn { color: #64748b; font-size: 10px; font-weight: 900; transition: 0.3s; text-transform: uppercase; }
        .nav-active { color: #6366f1; transform: translateY(-3px); }
        
        /* RANK ANIMATION */
        .rank-glow { animation: glow 1.5s infinite alternate; border: 1px solid #6366f1; }
        @keyframes glow { from { box-shadow: 0 0 5px #6366f1; background: rgba(99, 102, 241, 0.1); } to { box-shadow: 0 0 20px #6366f1; background: rgba(99, 102, 241, 0.3); } }

        #adWrapper { display: none; position: fixed; inset: 0; background: #000; z-index: 99999; flex-direction: column; }
        #adWrapper.active { display: flex; }
        .close-x { background: #ef4444; color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 26px; border: 4px solid #7f1d1d; box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
        .bottom-ad-fix { position: fixed; bottom: 85px; left: 0; right: 0; z-index: 40; display: flex; justify-content: center; background: rgba(2, 6, 23, 0.9); padding: 5px; backdrop-filter: blur(10px); }
    </style>
</head>
<body class="pb-64">

    <div id="adWrapper">
        <div class="bg-slate-900 p-4 flex justify-between items-center border-b border-white/10">
            <div class="flex flex-col">
                <span class="text-[10px] font-black text-indigo-400 uppercase italic">Verification Node</span>
                <span id="adTimerSec" class="text-sm font-bold text-red-500 italic">Connecting</span>
            </div>
            <div id="adActionArea"></div>
        </div>
        <iframe id="adIframe" class="flex-grow w-full border-none bg-white"></iframe>
    </div>

    <div id="mainApp">
        <header class="p-8 flex justify-between items-center border-b border-white/5 sticky top-0 bg-black/50 backdrop-blur-md z-50">
            <div><h2 id="welcomeUser" class="text-xl font-black italic">---</h2><div id="rankBadge" class="text-[9px] font-bold text-indigo-400 uppercase mt-1 px-3 py-1 rounded-full rank-glow">Rank: Bronze</div></div>
            <div class="glass px-5 py-2 border-indigo-500/30 text-right"><p class="text-[9px] font-bold text-indigo-400 uppercase">Vault</p><span id="balance" class="text-xl font-black text-white">0</span></div>
        </header>

        <div id="home" class="tab-content active p-6 space-y-4 max-w-lg mx-auto">
            <div id="taskList" class="grid grid-cols-1 gap-4"></div>
        </div>

        <div id="leaderboard" class="tab-content p-6 space-y-4 max-w-lg mx-auto text-center">
            <h3 class="font-black italic text-xl text-indigo-500 uppercase mb-6">World Rankings 🏆</h3>
            <div id="leaderList" class="space-y-3 text-left"></div>
        </div>

        <div id="wallet" class="tab-content p-6 space-y-6 max-w-lg mx-auto text-center">
            <div class="glass py-16 bg-gradient-to-b from-indigo-600/10 to-transparent border-indigo-500/10"><h2 class="text-7xl font-black italic text-center">₹<span id="cashVal">0</span></h2></div>
            <button onclick="shareInvite()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold text-[10px] uppercase shadow-lg">Share Referral Link 🚀</button>
            <div id="withdrawSection" class="space-y-3 text-left"></div>
        </div>

        <div id="profile" class="tab-content p-6 max-w-lg mx-auto">
            <div class="glass p-8 space-y-5">
                <input type="text" id="pName" placeholder="Full Name" class="simple-input">
                <input type="text" id="pUPI" placeholder="UPI ID" class="simple-input">
                <button onclick="saveProfile()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold uppercase italic">Update Identity</button>
            </div>
            <button onclick="logout()" class="w-full mt-10 text-red-500 font-bold text-xs uppercase underline italic text-center">Logout</button>
        </div>
    </div>

    <div class="bottom-ad-fix">
        <script type="text/javascript">
          atOptions = { 'key' : '2783e5b5e9656ec03b87289848eba5e4', 'format' : 'iframe', 'height' : 60, 'width' : 468, 'params' : {} };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/2783e5b5e9656ec03b87289848eba5e4/invoke.js"></script>
    </div>

    <nav id="navBar" class="fixed bottom-6 left-6 right-6 glass bg-black/90 border-white/10 p-5 flex justify-around items-center z-50 backdrop-blur-xl">
        <button onclick="switchTab('home')" class="nav-btn nav-active">HOME</button>
        <button onclick="switchTab('leaderboard')" class="nav-btn">RANK</button>
        <button onclick="switchTab('wallet')" class="nav-btn">WALLET</button>
        <button onclick="switchTab('profile')" class="nav-btn">IDENT</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, collection, getDocs, updateDoc, increment, runTransaction, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZ8MsMjt-dhXjY-fyYYtOs-X6UmvLAV3I",
            authDomain: "earnifyx-7d00a.firebaseapp.com",
            projectId: "earnifyx-7d00a",
            storageBucket: "earnifyx-7d00a.firebasestorage.app",
            messagingSenderId: "566816125641",
            appId: "1:566816125641:web:7258a20b6fcb119b985318"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userData = {}, currentTimer = null, activeReward = 0, activeTaskId = "";

        onAuthStateChanged(auth, (u) => { if(u){ sync(u.uid); } });

        function sync(uid) {
            onSnapshot(doc(db, "users", uid), (d) => {
                if(d.exists()){
                    userData = d.data();
                    document.getElementById('balance').innerText = userData.coins || 0;
                    document.getElementById('cashVal').innerText = Math.floor((userData.coins || 0) / 100);
                    document.getElementById('welcomeUser').innerText = userData.username;
                    document.getElementById('pName').value = userData.username || "";
                    document.getElementById('pUPI').value = userData.pUPI || "";
                    renderTasks();
                }
            });
        }

        async function renderTasks() {
            const list = document.getElementById('taskList'), today = new Date().toDateString(), logs = userData.taskLogs?.[today] || {};
            let html = "";
            const mSnap = await getDocs(collection(db, "main_ads"));
            mSnap.forEach(t => { if((logs[t.id] || 0) < 1) html += `<div class="glass p-6 flex justify-between items-center border-indigo-500/20"><div><p class="text-indigo-400 text-[9px] font-black uppercase">Premium Node</p><p class="font-black text-sm">+${t.data().reward} CR</p></div><button onclick="startAdFlow('${t.data().reward}', '${t.data().link}', '${t.id}', 'premium')" class="bg-indigo-600 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase">Run (3m)</button></div>`; });
            const tSnap = await getDocs(collection(db, "tasks"));
            tSnap.forEach(t => { if((logs[t.id] || 0) < 1) html += `<div class="glass p-6 flex justify-between items-center"><div><p class="text-slate-500 text-[8px] font-black uppercase">Task</p><p class="font-black text-sm uppercase">${t.data().title}</p></div><button onclick="startAdFlow('${t.data().reward}', '${t.data().link}', '${t.id}', 'normal')" class="bg-white text-black px-5 py-2 rounded-xl text-[10px] font-black uppercase">Start (50s)</button></div>`; });
            list.innerHTML = html || `<p class="text-center py-10">All Done Today! 🏆</p>`;
        }

        window.startAdFlow = (reward, link, taskId, type) => {
            activeReward = parseInt(reward); activeTaskId = taskId;
            document.getElementById('adIframe').src = link;
            document.getElementById('adWrapper').classList.add('active');
            let t = (type === 'premium') ? 180 : 50;
            currentTimer = setInterval(() => {
                t--; document.getElementById('adTimerSec').innerText = "VERIFYING IN " + t + "S";
                if(t <= 0){ clearInterval(currentTimer); document.getElementById('adActionArea').innerHTML = `<button onclick="finishTaskAndPay()" class="close-x">✕</button>`; }
            }, 1000);
        };

        window.finishTaskAndPay = async () => {
            const userRef = doc(db, "users", auth.currentUser.uid), today = new Date().toDateString();
            let isReferralComplete = ((userData.totalAdsWatched + 1) === 10 && userData.referredBy && !userData.refRewardSent);
            await runTransaction(db, async (t) => {
                t.update(userRef, { coins: increment(activeReward), ["taskLogs." + today + "." + activeTaskId]: 1, totalAdsWatched: increment(1) });
                if(isReferralComplete) {
                    const bossRef = doc(db, "users", userData.referredBy);
                    await updateDoc(bossRef, { coins: increment(500) });
                    t.update(userRef, { refRewardSent: true });
                }
            });
            confetti({ particleCount: 150 });
            document.getElementById('adWrapper').classList.remove('active');
        };

        window.switchTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        window.saveProfile = async () => { await updateDoc(doc(db, "users", auth.currentUser.uid), { username: document.getElementById('pName').value, pUPI: document.getElementById('pUPI').value }); alert("Saved!"); };
        window.logout = () => signOut(auth).then(() => location.reload());
        window.shareInvite = () => { 
            const link = `https://debajitboro508.github.io/Earnifyx/?ref=${auth.currentUser.uid}`;
            navigator.clipboard.writeText(`Join Earnifyx and earn: ${link}`); alert("Copied!"); 
        };
    </script>
</body>
</html>
