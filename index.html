<!DOCTYPE html>
<html lang="en">
<head>

    <title>Earnifyx | Tech Empire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Outfit', sans-serif; background: #020617; color: white; min-height: 100vh; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; transition: 0.3s; }
        .simple-input { background: #0f172a; border: 1px solid #1e293b; color: white; padding: 16px; border-radius: 16px; width: 100%; outline: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideIn 0.4s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .nav-btn { color: #64748b; font-size: 10px; font-weight: 900; transition: 0.3s; text-transform: uppercase; }
        .nav-active { color: #6366f1; transform: translateY(-3px); }
        #adWrapper { display: none; position: fixed; inset: 0; background: #000; z-index: 99999; flex-direction: column; }
        #adWrapper.active { display: flex; }
        .close-x { background: #ef4444; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 24px; border: 4px solid #7f1d1d; }
        
        /* ADS KO NISE (BOTTOM) RAKHNE KA FIX */
        .bottom-ad-fix { position: fixed; bottom: 80px; left: 0; right: 0; z-index: 40; display: flex; justify-content: center; background: rgba(2, 6, 23, 0.8); padding: 5px; backdrop-blur: md; }
    </style>
</head>
<body class="pb-60"> <div id="adWrapper">
        <div class="bg-slate-900 p-4 flex justify-between items-center border-b border-white/10">
            <div class="flex flex-col">
                <span class="text-[10px] font-black text-indigo-400 uppercase italic">Verification Node</span>
                <span id="adTimerSec" class="text-sm font-bold text-red-500 italic">Connecting</span>
            </div>
            <div id="adActionArea"></div>
        </div>
        <iframe id="adIframe" class="flex-grow w-full border-none bg-white"></iframe>
    </div>

    <div id="mainApp">
        <header class="p-8 flex justify-between items-center border-b border-white/5 sticky top-0 bg-black/50 backdrop-blur-md z-50">
            <div><h2 id="welcomeUser" class="text-xl font-black italic">---</h2><div class="text-[9px] font-bold text-indigo-400 uppercase mt-1 italic">Rank: Bronze</div></div>
            <div class="glass px-5 py-2 border-indigo-500/30 text-right"><p class="text-[9px] font-bold text-indigo-400 uppercase">Vault</p><span id="balance" class="text-xl font-black text-white">0</span></div>
        </header>

        <div id="home" class="tab-content active p-6 space-y-4 max-w-lg mx-auto">
            <div class="glass p-5 border-l-4 border-indigo-500 flex justify-between items-center bg-indigo-500/5">
                <p class="font-black text-sm text-indigo-400 italic uppercase">Daily 40 Ads Target</p>
                <p class="text-xl font-black text-white">0/40</p>
            </div>
            
            <div id="taskList" class="grid grid-cols-1 gap-4"></div>
        </div>
    </div>

    <div class="bottom-ad-fix">
        <script type="text/javascript">
          atOptions = { 'key' : '2783e5b5e9656ec03b87289848eba5e4', 'format' : 'iframe', 'height' : 60, 'width' : 468, 'params' : {} };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/2783e5b5e9656ec03b87289848eba5e4/invoke.js"></script>
    </div>

    <nav id="navBar" class="fixed bottom-4 left-6 right-6 glass bg-black/90 border-white/10 p-5 flex justify-around items-center z-50 backdrop-blur-xl">
        <button class="nav-btn nav-active">HOME</button>
        <button class="nav-btn">RANK</button>
        <button class="nav-btn">WALLET</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, collection, getDocs, increment, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZ8MsMjt-dhXjY-fyYYtOs-X6UmvLAV3I",
            authDomain: "earnifyx-7d00a.firebaseapp.com",
            projectId: "earnifyx-7d00a",
            storageBucket: "earnifyx-7d00a.firebasestorage.app",
            messagingSenderId: "566816125641",
            appId: "1:566816125641:web:7258a20b6fcb119b985318"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userData = {}, activeReward = 0, activeTaskId = "", currentTimer = null;

        onAuthStateChanged(auth, (u) => { if(u){ sync(u.uid); } });

        function sync(uid) {
            onSnapshot(doc(db, "users", uid), (d) => {
                if(d.exists()){
                    userData = d.data();
                    document.getElementById('balance').innerText = userData.coins || 0;
                    document.getElementById('welcomeUser').innerText = userData.username;
                    renderAll();
                }
            });
        }

        async function renderAll() {
            const list = document.getElementById('taskList'), today = new Date().toDateString(), logs = userData.taskLogs?.[today] || {};
            let html = "";
            
            // ADMIN PANEL KI SARI ADS KO FETCH KARNA
            const mSnap = await getDocs(collection(db, "main_ads"));
            mSnap.forEach(t => {
                if((logs[t.id] || 0) < 2) {
                    html += `
                    <div class="glass p-6 flex justify-between items-center border border-indigo-500/20">
                        <div>
                            <p class="text-indigo-400 text-[9px] font-black uppercase italic">Premium Node</p>
                            <p class="font-black text-sm italic">+${t.data().reward} CR</p>
                        </div>
                        <button onclick="startAdFlow('${t.data().reward}', '${t.data().link}', '${t.id}', 'premium')" class="bg-indigo-600 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase italic">Run Ad</button>
                    </div>`;
                }
            });
            list.innerHTML = html || `<p class="text-center text-slate-500 font-bold uppercase">All Done!</p>`;
        }

        window.startAdFlow = (reward, link, taskId, type) => {
            activeReward = parseInt(reward); activeTaskId = taskId;
            document.getElementById('adIframe').src = link;
            document.getElementById('adWrapper').classList.add('active');
            let t = 50;
            currentTimer = setInterval(() => {
                t--; document.getElementById('adTimerSec').innerText = "VERIFYING IN " + t + "S";
                if(t <= 0){ 
                    clearInterval(currentTimer); 
                    document.getElementById('adActionArea').innerHTML = `<button onclick="finishTaskAndPay()" class="close-x">✕</button>`; 
                }
            }, 1000);
        };

        window.finishTaskAndPay = async () => {
            const userRef = doc(db, "users", auth.currentUser.uid), today = new Date().toDateString();
            await runTransaction(db, async (t) => {
                const snap = await t.get(userRef);
                let logs = snap.data().taskLogs || {}; if(!logs[today]) logs[today] = {};
                logs[today][activeTaskId] = (logs[today][activeTaskId] || 0) + 1;
                t.update(userRef, { coins: increment(activeReward), taskLogs: logs });
            });
            confetti({ particleCount: 150 });
            document.getElementById('adWrapper').classList.remove('active');
        };
    </script>
</body>
</html>
