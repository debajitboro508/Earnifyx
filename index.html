<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earnifyx | Payment Empire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #000; color: white; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .insta-input { background: #121212; border: 1px solid #262626; color: white; padding: 12px; border-radius: 8px; width: 100%; outline: none; margin-bottom: 10px; font-size: 14px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }

        /* --- THE AD OVERLAY WITH LAL X BUTTON --- */
        #adWrapper { display: none; position: fixed; inset: 0; background: #000; z-index: 99999; }
        #adWrapper.active { display: block; }
        #adIframe { width: 100%; height: 100%; border: none; }
        #adCloseButton { 
            display: none; position: absolute; top: 15px; right: 15px; 
            background: #ff0000; color: white; width: 45px; height: 45px; 
            border-radius: 50%; font-weight: 900; border: 2px solid #fff;
            box-shadow: 0 0 20px rgba(255,0,0,0.6); z-index: 100000;
            align-items: center; justify-content: center; cursor: pointer;
        }
        #adCounter {
            position: absolute; top: 15px; left: 15px;
            background: rgba(0,0,0,0.8); color: #fff; padding: 6px 15px;
            border-radius: 20px; font-size: 12px; font-weight: bold;
            z-index: 100000;
        }
    </style>
</head>
<body class="pb-24">

    <div id="adWrapper">
        <div id="adCounter">Wait <span id="adTimerSec">50</span>s for Reward</div>
        <button id="adCloseButton" onclick="finishTaskAndPay()">✕</button>
        <iframe id="adIframe" src=""></iframe>
    </div>

    <div id="authScreen" class="flex flex-col justify-center min-h-screen p-6 max-w-sm mx-auto text-center">
        <div class="p-8 border border-[#262626] rounded-3xl bg-[#050505]">
            <h1 class="text-4xl font-black italic mb-8 tracking-tighter text-indigo-500">Earnifyx</h1>
            <input type="text" id="username" placeholder="Name" class="insta-input w-full">
            <input type="email" id="email" placeholder="Email" class="insta-input w-full">
            <input type="password" id="pass" placeholder="Password" class="insta-input w-full">
            <button onclick="handleAuth()" class="w-full bg-[#0095f6] p-4 rounded-xl font-black uppercase mt-4">Get Started</button>
            <button onclick="resetPass()" class="mt-4 text-[10px] text-slate-500 hover:text-white uppercase font-bold tracking-widest">Forgot Password?</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="sticky top-0 z-50 bg-black border-b border-[#262626] p-4 flex justify-between items-center">
            <h2 id="welcomeUser" class="text-xl font-black italic text-indigo-500">User</h2>
            <div class="bg-[#121212] px-4 py-1 rounded-full border border-indigo-500/50 text-indigo-400 font-bold">
                🪙 <span id="balance">0</span>
            </div>
        </header>

        <div id="home" class="tab-content active p-4 space-y-4 max-w-lg mx-auto">
            <div class="glass p-5 border-l-4 border-green-500 flex justify-between items-center">
                <div><p class="font-bold text-sm">🎁 Daily Bonus</p><p id="bonusInfo" class="text-[10px] text-slate-400 uppercase">Check Streak</p></div>
                <button onclick="claimDailyBonus()" class="bg-green-600 px-4 py-2 rounded-xl text-[10px] font-black text-black">Claim</button>
            </div>
            
            <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Daily Tasks</h3>
            <div id="taskList" class="space-y-3"></div>

            <div class="pt-6">
                <h3 class="text-[10px] font-black text-indigo-500 uppercase mb-3 text-center tracking-widest">🏆 Top 10 Earners</h3>
                <div id="leaderboard" class="glass p-4 text-[11px] space-y-3"></div>
            </div>
        </div>

        <div id="wallet" class="tab-content p-4 space-y-6 max-w-lg mx-auto text-center">
            <div class="glass p-10 bg-indigo-600/10 border border-indigo-500/30">
                <h2 class="text-6xl font-black">🪙 <span id="wBal">0</span></h2>
                <p class="text-green-500 font-bold mt-2">≈ ₹<span id="cashVal">0</span></p>
            </div>
            <button onclick="handleWithdraw(2000)" class="w-full glass p-5 flex justify-between items-center border border-slate-800 text-xs font-bold">Withdraw ₹20 <span>2000 🪙</span></button>
            <button onclick="handleWithdraw(5000)" class="w-full glass p-5 flex justify-between items-center border border-slate-800 text-xs font-bold">Withdraw ₹50 <span>5000 🪙</span></button>
        </div>

        <div id="profile" class="tab-content p-6 max-w-lg mx-auto">
            <div class="glass p-6 space-y-4 border border-slate-800">
                <p class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Bank Details</p>
                <input type="text" id="pName" placeholder="Full Name" class="insta-input w-full">
                <input type="text" id="pAcc" placeholder="UPI ID / Account No" class="insta-input w-full">
                <input type="text" id="pIFSC" placeholder="IFSC Code" class="insta-input w-full">
                <button onclick="saveProfile()" class="w-full bg-white text-black p-4 rounded-xl font-black text-xs uppercase">Save Profile</button>
            </div>
            <button onclick="logout()" class="w-full mt-10 text-red-500 font-bold text-xs underline uppercase">Logout</button>
        </div>
    </div>

    <nav id="navBar" class="hidden fixed bottom-0 left-0 right-0 bg-black border-t border-[#262626] p-4 flex justify-around z-50">
        <button onclick="switchTab('home')">🏠</button>
        <button onclick="switchTab('wallet')">💳</button>
        <button onclick="switchTab('profile')">👤</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, updateDoc, increment, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZ8MsMjt-dhXjY-fyYYtOs-X6UmvLAV3I",
            authDomain: "earnifyx-7d00a.firebaseapp.com",
            projectId: "earnifyx-7d00a",
            storageBucket: "earnifyx-7d00a.firebasestorage.app",
            messagingSenderId: "566816125641",
            appId: "1:566816125641:web:7258a20b6fcb119b985318"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let activeReward = 0; let userData = {};

        // --- AD OVERLAY LOGIC (Fixed to 50s) ---
        window.startAdFlow = (reward, link) => {
            activeReward = parseInt(reward);
            const wrapper = document.getElementById('adWrapper');
            const iframe = document.getElementById('adIframe');
            const xBtn = document.getElementById('adCloseButton');
            const timerSec = document.getElementById('adTimerSec');

            let finalLink = link;
            if(link.includes('youtube.com/watch?v=')) finalLink = link.replace('watch?v=', 'embed/');

            iframe.src = finalLink;
            wrapper.classList.add('active');
            xBtn.style.display = "none";

            let timeLeft = 50; // Timer set to 50 seconds
            timerSec.innerText = timeLeft;
            const countdown = setInterval(() => {
                timeLeft--;
                timerSec.innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(countdown);
                    xBtn.style.display = "flex"; // SHOW LAL X
                }
            }, 1000);
        };

        window.finishTaskAndPay = async () => {
            if(activeReward <= 0) return;
            await updateDoc(doc(db, "users", auth.currentUser.uid), { coins: increment(activeReward) });
            document.getElementById('adWrapper').classList.remove('active');
            document.getElementById('adIframe').src = "";
            confetti({ particleCount: 150 });
            activeReward = 0;
        };

        // --- AUTH & SYNC ---
        window.resetPass = () => {
            const email = document.getElementById('email').value;
            if(!email) return alert("Pehle email box mein apna email likhein!");
            sendPasswordResetEmail(auth, email).then(() => alert("Reset link sent!")).catch(e => alert(e.message));
        };

        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('navBar').classList.remove('hidden');
                sync(user.uid);
            }
        });

        function sync(uid) {
            onSnapshot(doc(db, "users", uid), (d) => {
                if(d.exists()){
                    userData = d.data();
                    document.getElementById('balance').innerText = userData.coins || 0;
                    document.getElementById('wBal').innerText = userData.coins || 0;
                    // Fix: 100 Coins = 1 Rupee for Profit
                    document.getElementById('cashVal').innerText = ((userData.coins || 0)/100).toFixed(0);
                    document.getElementById('welcomeUser').innerText = userData.username || "User";
                    const s = userData.bonusStreak || 0;
                    document.getElementById('bonusInfo').innerText = `Streak: ${s} Days`;
                }
            });

            // TOP 10 USERS
            const q = query(collection(db, "users"), orderBy("coins", "desc"), limit(10));
            onSnapshot(q, (s) => {
                const lb = document.getElementById('leaderboard'); lb.innerHTML = "";
                s.forEach((doc, i) => {
                    const u = doc.data();
                    const medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : "👤";
                    lb.innerHTML += `<div class="flex justify-between p-2 rounded-xl bg-white/5 border border-white/5"><span>${i+1}. ${medal} ${u.username}</span><span class="text-indigo-400 font-black">🪙 ${u.coins}</span></div>`;
                });
            });

            // ADMIN DYNAMIC COINS FROM "tasks"
            onSnapshot(collection(db, "tasks"), (s) => {
                const list = document.getElementById('taskList'); list.innerHTML = "";
                s.forEach(t => {
                    const task = t.data();
                    list.innerHTML += `<div class="glass p-5 flex justify-between items-center border-l-4 border-indigo-600"><div><p class="font-bold text-sm italic">${task.title}</p><p class="text-[10px] text-indigo-400 font-black">+${task.reward} Coins</p></div><button onclick="startAdFlow('${task.reward}', '${task.link}')" class="bg-indigo-600 px-6 py-2 rounded-xl text-[10px] font-black uppercase">Watch</button></div>`;
                });
            });
        }

        window.claimDailyBonus = async () => {
            const today = new Date().toDateString();
            if(userData.lastBonusDate === today) return alert("Already claimed today!");
            
            // Streak Logic: Reset to 1 after 6 days
            let streak = (userData.bonusStreak >= 6) ? 1 : (userData.bonusStreak || 0) + 1;
            
            // Bonus Amount Logic (1-3 days: 50, 4-6 days: 100)
            const amt = (streak <= 3) ? 50 : 100;
            
            await updateDoc(doc(db, "users", auth.currentUser.uid), { 
                coins: increment(amt), 
                lastBonusDate: today, 
                bonusStreak: streak 
            });
            alert(`Day ${streak}: ${amt} Coins Claimed!`);
        };

        window.saveProfile = async () => {
            const name = document.getElementById('pName').value;
            const acc = document.getElementById('pAcc').value;
            if(!name || !acc) return alert("Please fill details!");
            await updateDoc(doc(db, "users", auth.currentUser.uid), { 
                username: name, 
                pAcc: acc, 
                pIFSC: document.getElementById('pIFSC').value,
                profileDone: true 
            });
            alert("Profile Saved!");
        };

        window.handleWithdraw = async (amt) => {
            if(userData.coins < amt) return alert("Low balance!");
            if(!userData.profileDone) return alert("Please complete Bank Details first!");
            await addDoc(collection(db, "withdrawals"), { 
                uid: auth.currentUser.uid, 
                username: userData.username,
                amt, 
                status: "pending", 
                date: new Date().toLocaleString() 
            });
            await updateDoc(doc(db, "users", auth.currentUser.uid), { coins: increment(-amt) });
            alert("Withdrawal Requested Successfully!");
        };

        window.handleAuth = async () => {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value, u = document.getElementById('username').value;
            if(!e || !p) return alert("Email/Pass missing");
            try {
                const r = await createUserWithEmailAndPassword(auth, e, p);
                await setDoc(doc(db, "users", r.user.uid), { username: u, email: e, coins: 100, bonusStreak: 0, profileDone: false });
            } catch { signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message)); }
        };

        window.switchTab = (id) => { document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); };
        window.logout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
