<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="https://pl29211880.profitablecpmratenetwork.com/6c/eb/7c/6ceb7cce01d79f2acaf9e9cdce1cad80.js"></script>
    <script src="https://pl29211883.profitablecpmratenetwork.com/66/eb/56/66eb56200857fc2d4bc3226cb621ea67.js"></script>

    <title>Earnifyx | Tech Empire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Outfit', sans-serif; background: #020617; color: white; min-height: 100vh; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; transition: 0.3s; }
        .simple-input { background: #0f172a; border: 1px solid #1e293b; color: white; padding: 16px; border-radius: 16px; width: 100%; outline: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideIn 0.4s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .nav-btn { color: #64748b; font-size: 10px; font-weight: 900; transition: 0.3s; text-transform: uppercase; }
        .nav-active { color: #6366f1; transform: translateY(-3px); }
        #adWrapper { display: none; position: fixed; inset: 0; background: #000; z-index: 99999; flex-direction: column; }
        #adWrapper.active { display: flex; }
        /* LAL RANG KA X BUTTON - TIMER KE BAAD HI AY EGA */
        .close-x { background: #ef4444; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 24px; border: 4px solid #7f1d1d; box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); transition: 0.2s; }
        .close-x:active { scale: 0.9; }
        #rulesModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100001; padding: 20px; overflow-y: auto; }
    </style>
</head>
<body class="pb-32">

    <div id="rulesModal">
        <div class="max-w-md mx-auto py-10">
            <h2 class="text-3xl font-black text-indigo-500 italic uppercase mb-6 text-center">Empire Rules 📜</h2>
            <div class="space-y-4 text-slate-300 text-[10px] font-bold uppercase tracking-wider">
                <div class="p-4 border-l-2 border-indigo-500 bg-white/5"><p class="text-indigo-400">1. Referral Bonus</p><p>10 Ads watched = 1000 CR.</p></div>
                <div class="p-4 border-l-2 border-red-500 bg-white/5"><p class="text-red-400">2. Timer Policy</p><p>Wait for timer to finish to see the X button.</p></div>
            </div>
            <button onclick="document.getElementById('rulesModal').style.display='none'" class="w-full bg-indigo-600 p-4 rounded-2xl mt-8 font-black uppercase">I Understand</button>
        </div>
    </div>

    <div id="adWrapper">
        <div class="bg-slate-900 p-4 flex justify-between items-center border-b border-white/10">
            <div class="flex flex-col">
                <span class="text-[10px] font-black text-indigo-400 uppercase italic">Verifying Task</span>
                <span id="adTimerSec" class="text-sm font-bold text-red-500 italic">Starting...</span>
            </div>
            <div id="adActionArea">
                <span class="text-[10px] text-slate-500 font-bold uppercase italic">Wait for timer</span>
            </div>
        </div>
        <iframe id="adIframe" class="flex-grow w-full border-none bg-white"></iframe>
    </div>

    <div id="authScreen" class="flex flex-col justify-center min-h-screen p-8 max-w-md mx-auto text-center">
        <div class="p-8 glass">
            <h1 class="text-5xl font-black italic mb-2 text-indigo-500 uppercase">Earnifyx</h1>
            <p class="text-[10px] text-slate-500 font-bold tracking-[4px] mb-10 uppercase italic">Digital Empire</p>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Full Name" class="simple-input">
                <input type="email" id="email" placeholder="Email" class="simple-input">
                <input type="password" id="pass" placeholder="Password" class="simple-input">
                <input type="text" id="refBy" placeholder="Ref Code" class="simple-input">
            </div>
            <button onclick="handleAuth()" class="w-full bg-indigo-600 p-4 rounded-2xl font-black uppercase mt-8">Initialize</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="p-8 flex justify-between items-center border-b border-white/5 sticky top-0 bg-black/80 backdrop-blur-md z-50">
            <div>
                <h2 id="welcomeUser" class="text-xl font-black italic">---</h2>
                <div id="rankBadge" class="text-[9px] font-bold text-indigo-400 uppercase mt-1">Rank: Bronze</div>
            </div>
            <div class="glass px-5 py-2 border-indigo-500/30 text-right">
                <p class="text-[9px] font-bold text-indigo-400 uppercase">Vault</p>
                <span id="balance" class="text-xl font-black text-white">0</span>
            </div>
        </header>

        <div id="home" class="tab-content active p-6 space-y-4 max-w-lg mx-auto">
            <div class="flex justify-center">
                <script async="async" data-cfasync="false" src="https://pl29211881.profitablecpmratenetwork.com/2df2b4ae3a6f83c23e53fd7d880b0ff8/invoke.js"></script>
                <div id="container-2df2b4ae3a6f83c23e53fd7d880b0ff8"></div>
            </div>

            <div class="glass p-5 border-l-4 border-indigo-500 flex justify-between items-center bg-indigo-500/5">
                <p class="font-black text-sm text-indigo-400 italic uppercase">Daily 40 Ads Target</p>
                <p id="dailyAdProgress" class="text-xl font-black text-white">0/40</p>
            </div>

            <div id="taskList" class="grid grid-cols-1 gap-4"></div>
        </div>

        <div id="leaderboard" class="tab-content p-6 space-y-4 max-w-lg mx-auto">
            <button onclick="switchTab('home')" class="text-indigo-400 font-black text-[10px] uppercase mb-4 italic">← Back to Home</button>
            <h3 class="text-center font-black italic text-xl text-indigo-500 uppercase mb-6">World Rankings 🏆</h3>
            <div id="leaderList" class="space-y-3"></div>
        </div>

        <div id="wallet" class="tab-content p-6 space-y-6 max-w-lg mx-auto text-center">
            <button onclick="switchTab('home')" class="text-indigo-400 font-black text-[10px] uppercase mb-4 italic">← Back to Home</button>
            <div class="glass py-16 bg-gradient-to-b from-indigo-600/10 to-transparent border-indigo-500/10">
                <p class="text-[10px] text-slate-400 uppercase font-bold mb-4 tracking-widest">Available Balance</p>
                <h2 class="text-7xl font-black italic">₹<span id="cashVal">0</span></h2>
            </div>
            <button onclick="shareInvite()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold text-[10px] uppercase">Invite Friends 🚀</button>
            <div id="withdrawSection" class="space-y-3 text-left"></div>
        </div>

        <div id="profile" class="tab-content p-6 max-w-lg mx-auto">
            <button onclick="switchTab('home')" class="text-indigo-400 font-black text-[10px] uppercase mb-4 italic">← Back to Home</button>
            <div class="glass p-8 space-y-5">
                <input type="text" id="pName" placeholder="Update Name" class="simple-input">
                <input type="text" id="pUPI" placeholder="UPI ID (GPay/PhonePe)" class="simple-input">
                <button onclick="saveProfile()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold uppercase">Save Identity</button>
            </div>
            <button onclick="logout()" class="w-full mt-10 text-red-500 font-bold text-xs uppercase underline italic text-center">Logout</button>
        </div>
    </div>

    <nav id="navBar" class="hidden fixed bottom-6 left-6 right-6 glass bg-black/90 border-white/10 p-5 flex justify-around items-center z-50 backdrop-blur-xl">
        <button onclick="switchTab('home')" id="btn-home" class="nav-btn nav-active">HOME</button>
        <button onclick="switchTab('leaderboard')" id="btn-leaderboard" class="nav-btn">RANK</button>
        <button onclick="switchTab('wallet')" id="btn-wallet" class="nav-btn">WALLET</button>
        <button onclick="switchTab('profile')" id="btn-profile" class="nav-btn">IDENT</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, updateDoc, increment, getDocs, query, orderBy, limit, runTransaction, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZ8MsMjt-dhXjY-fyYYtOs-X6UmvLAV3I",
            authDomain: "earnifyx-7d00a.firebaseapp.com",
            projectId: "earnifyx-7d00a",
            storageBucket: "earnifyx-7d00a.firebasestorage.app",
            messagingSenderId: "566816125641",
            appId: "1:566816125641:web:7258a20b6fcb119b985318"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let activeReward = 0, activeTaskId = "", userData = {}, currentTimer = null;

        // AD FLOW WITH TIMER AND X MARK
        window.startAdFlow = (reward, link, taskId, type) => {
            activeReward = parseInt(reward); activeTaskId = taskId;
            document.getElementById('adIframe').src = link;
            document.getElementById('adWrapper').classList.add('active');
            
            const timerLabel = document.getElementById('adTimerSec');
            const actionArea = document.getElementById('adActionArea');
            actionArea.innerHTML = `<span class="text-[10px] text-slate-500 font-bold uppercase italic">Verifying...</span>`;
            
            if(currentTimer) clearInterval(currentTimer);
            let t = (type === 'premium') ? 180 : 50; // PREMIUM ADS = 3 MIN, NORMAL = 50S

            currentTimer = setInterval(() => {
                t--; timerLabel.innerText = "VERIFYING IN " + t + "S";
                if(t <= 0){ 
                    clearInterval(currentTimer); 
                    timerLabel.innerText = "SUCCESS ✅";
                    // TIMER KHATAM HONE PAR HI LAL X BUTTON AY EGA
                    actionArea.innerHTML = `<button onclick="finishTaskAndPay()" class="close-x">✕</button>`; 
                }
            }, 1000);
        };

        window.finishTaskAndPay = async () => {
            const uid = auth.currentUser.uid, userRef = doc(db, "users", uid), today = new Date().toDateString();
            try {
                await runTransaction(db, async (t) => {
                    const snap = await t.get(userRef);
                    let logs = snap.data().taskLogs || {}; if(!logs[today]) logs[today] = {};
                    logs[today][activeTaskId] = (logs[today][activeTaskId] || 0) + 1;
                    t.update(userRef, { coins: increment(activeReward), taskLogs: logs, totalAdsWatched: increment(1) });
                });
                confetti({ particleCount: 150 });
                document.getElementById('adWrapper').classList.remove('active');
            } catch (e) { alert("Error!"); }
        };

        onAuthStateChanged(auth, (u) => { if(u){ sync(u.uid); document.getElementById('authScreen').classList.add('hidden'); document.getElementById('mainApp').classList.remove('hidden'); document.getElementById('navBar').classList.remove('hidden'); } });

        function sync(uid) {
            onSnapshot(doc(db, "users", uid), (d) => {
                if(d.exists()){
                    userData = d.data();
                    document.getElementById('balance').innerText = userData.coins || 0;
                    document.getElementById('cashVal').innerText = Math.floor((userData.coins || 0) / 100);
                    document.getElementById('welcomeUser').innerText = userData.username;
                    document.getElementById('dailyAdProgress').innerText = `${userData.dailyAdsCount?.[new Date().toDateString()] || 0}/40`;
                    renderAll();
                }
            });
        }

        async function renderAll() {
            const list = document.getElementById('taskList'), today = new Date().toDateString(), logs = userData.taskLogs?.[today] || {};
            let html = "";
            const mSnap = await getDocs(collection(db, "main_ads"));
            mSnap.forEach(t => { 
                if((logs[t.id] || 0) < 2) 
                html += `<div class="glass p-6 flex justify-between items-center border border-indigo-500/20"><div><p class="text-indigo-400 text-[9px] font-black uppercase">Premium Task</p><p class="font-black text-sm italic">+${t.data().reward} CR</p></div><button onclick="startAdFlow('${t.data().reward}', '${t.data().link}', '${t.id}', 'premium')" class="bg-indigo-600 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase">Run Ad</button></div>`; 
            });
            list.innerHTML = html || `<p class="text-center text-slate-500 text-[10px] font-bold uppercase">All Tasks Done!</p>`;
        }

        window.switchTab = (id) => { 
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-'+id).classList.add('nav-active');
            if(id === 'leaderboard') fetchLeaderboard();
        };

        window.handleAuth = async () => {
            const e = document.getElementById('email').value.trim();
            const p = document.getElementById('pass').value.trim();
            const u = document.getElementById('username').value.trim();
            if(!e || !p || !u) return alert("Fill all details!");
            try {
                const rs = await createUserWithEmailAndPassword(auth, e, p);
                await setDoc(doc(db, "users", rs.user.uid), { username: u, email: e, coins: 100, taskLogs: {}, totalAdsWatched: 0 });
            } catch (err) { signInWithEmailAndPassword(auth, e, p).catch(() => alert("Failed!")); }
        };

        window.saveProfile = async () => { 
            await updateDoc(doc(db, "users", auth.currentUser.uid), { username: document.getElementById('pName').value, pUPI: document.getElementById('pUPI').value }); 
            alert("Saved! ✅"); 
        };

        window.logout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
