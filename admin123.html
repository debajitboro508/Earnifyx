<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earnifyx Admin | Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; min-height: 100vh; font-size: 12px; font-family: 'Outfit', sans-serif; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .data-table th, .data-table td { border: 1px solid #1e293b; padding: 10px; text-align: left; }
        .data-table th { background: #1e1b4b; color: #818cf8; text-transform: uppercase; font-size: 10px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; overflow-y: auto; padding: 20px; }
        .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 20px; padding: 24px; }
    </style>
</head>
<body class="p-6">

    <div id="dataModal" class="modal">
        <div class="flex justify-between items-center mb-4">
            <h2 id="modalTitle" class="text-xl font-bold text-indigo-400 italic">Data View</h2>
            <button onclick="document.getElementById('dataModal').style.display='none'" class="bg-red-600 px-4 py-1 rounded font-bold">CLOSE</button>
        </div>
        <div id="modalContent" class="overflow-x-auto"></div>
    </div>

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <h1 class="text-2xl font-black italic uppercase tracking-tighter text-indigo-500">EARNIFYX CONTROL</h1>
            <div class="flex gap-2">
                <button onclick="showData('users')" class="bg-indigo-600 px-4 py-2 rounded-lg font-bold uppercase text-[10px]">📊 View Users</button>
                <button onclick="showData('withdrawals')" class="bg-green-600 px-4 py-2 rounded-lg font-bold uppercase text-[10px]">💰 View Payouts</button>
            </div>
        </div>

        <div id="notifStatus" class="mb-6 p-3 rounded-xl bg-indigo-500/10 border border-indigo-500/20 text-center text-[10px] font-bold uppercase text-indigo-400">
            🔔 Live Notifications Active
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="card border-green-600/30 md:col-span-2 mb-4">
                <h3 class="font-bold mb-4 text-green-500 uppercase">💸 Action Needed: Pending Payouts</h3>
                <div id="pendingActions" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <p class="text-slate-500 italic text-[10px]">Checking for requests...</p>
                </div>
            </div>

            <div class="card border-yellow-600/30">
                <h3 class="font-bold mb-4 text-yellow-500 uppercase">📢 Main Ad Management</h3>
                <input type="text" id="adURL" placeholder="Paste Ad Link" class="w-full bg-black p-3 rounded-xl mb-2 border border-slate-800 text-white">
                <input type="number" id="adReward" placeholder="Reward Amount" class="w-full bg-black p-3 rounded-xl mb-4 border border-slate-800 text-white">
                <button onclick="saveAd()" class="w-full bg-yellow-600 p-3 rounded-xl font-bold text-black uppercase">Add Main Ad</button>
                <div id="mainAdsList" class="mt-6 space-y-3"></div>
            </div>

            <div class="card">
                <h3 class="font-bold mb-4 text-indigo-400 uppercase">➕ Add New Task</h3>
                <input type="text" id="tTitle" placeholder="Task Name" class="w-full bg-black p-3 rounded-xl mb-2 border border-slate-800 text-white">
                <input type="number" id="tReward" placeholder="Reward Coins" class="w-full bg-black p-3 rounded-xl mb-2 border border-slate-800 text-white">
                <input type="text" id="tLink" placeholder="Task Link" class="w-full bg-black p-3 rounded-xl mb-4 border border-slate-800 text-white">
                <button onclick="addTask()" class="w-full bg-indigo-600 p-3 rounded-xl font-bold uppercase">Publish Task</button>
            </div>

            <div class="card border-red-600/20 md:col-span-2">
                <h3 class="font-bold mb-4 text-red-500 uppercase">🗑️ Manage Active Tasks</h3>
                <div id="adminTaskList" class="grid grid-cols-1 md:grid-cols-3 gap-3"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, deleteDoc, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZ8MsMjt-dhXjY-fyYYtOs-X6UmvLAV3I",
            authDomain: "earnifyx-7d00a.firebaseapp.com",
            projectId: "earnifyx-7d00a",
            storageBucket: "earnifyx-7d00a.firebasestorage.app",
            messagingSenderId: "566816125641",
            appId: "1:566816125641:web:7258a20b6fcb119b985318"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.saveAd = async () => {
            const link = document.getElementById('adURL').value, reward = parseInt(document.getElementById('adReward').value);
            if(!link || !reward) return alert("Details bhariye");
            await addDoc(collection(db, "main_ads"), { link, reward });
            alert("Main Ad Added!");
        };

        window.removeAd = async (id) => { if(confirm("Delete Ad?")) await deleteDoc(doc(db, "main_ads", id)); };
        
        window.addTask = async () => {
            const title = document.getElementById('tTitle').value, reward = parseInt(document.getElementById('tReward').value), link = document.getElementById('tLink').value;
            if(!title || !reward || !link) return alert("Fields bhariye");
            await addDoc(collection(db, "tasks"), { title, reward, link });
            alert("Task Published!");
        };

        window.deleteTask = async (id) => { if(confirm("Delete task?")) await deleteDoc(doc(db, "tasks", id)); };

        let firstLoad = true;
        function listenForPayouts() {
            onSnapshot(collection(db, "withdrawals"), (snapshot) => {
                const pendingDiv = document.getElementById('pendingActions');
                let pendingHTML = "";
                
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    if(data.status === "pending") {
                        pendingHTML += `
                            <div class="bg-black/40 p-4 rounded-xl border border-green-500/30">
                                <p class="text-white font-bold">${data.username}</p>
                                <p class="text-green-400 text-lg font-black">₹${data.amt/100}</p>
                                <p class="text-[9px] text-slate-400 mb-3">${data.date}</p>
                                <button onclick="approvePayout('${docSnap.id}')" class="w-full bg-green-600 py-2 rounded-lg text-[10px] font-bold uppercase hover:bg-green-500">Mark Paid ✅</button>
                            </div>`;
                    }
                });

                pendingDiv.innerHTML = pendingHTML || '<p class="text-slate-500 italic text-[10px]">No pending requests</p>';

                if (firstLoad) { firstLoad = false; return; }

                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added" && change.doc.data().status === "pending") {
                        const data = change.doc.data();
                        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
                        audio.play().catch(() => {});
                        alert(`🚨 NEW PAYOUT REQUEST!\nUser: ${data.username}\nAmount: ₹${data.amt/100}`);
                    }
                });
            });
        }

        window.approvePayout = async (id) => {
            if(confirm("Have you sent the money? Clicking OK will notify the user.")) {
                await updateDoc(doc(db, "withdrawals", id), { status: "approved" });
                alert("Payment Marked as Approved!");
            }
        };

        function sync() {
            onSnapshot(collection(db, "main_ads"), (s) => {
                const list = document.getElementById('mainAdsList'); list.innerHTML = "";
                s.forEach(t => { 
                    list.innerHTML += `<div class="bg-black/40 p-3 rounded-xl flex justify-between border border-slate-800">
                        <div><p class="text-white text-[10px] truncate w-32">${t.data().link}</p><p class="text-yellow-500 font-bold text-[9px]">${t.data().reward} Coins</p></div>
                        <button onclick="removeAd('${t.id}')" class="bg-red-600/20 text-red-500 px-3 py-1 rounded-lg text-[9px] font-bold uppercase">Delete</button>
                    </div>`; 
                });
            });
            onSnapshot(collection(db, "tasks"), (s) => {
                const list = document.getElementById('adminTaskList'); list.innerHTML = "";
                s.forEach(t => { 
                    list.innerHTML += `<div class="bg-black/40 p-3 rounded-xl flex justify-between border border-slate-800">
                        <div><p class="font-bold text-white">${t.data().title}</p><p class="text-indigo-400 font-black text-[9px]">+${t.data().reward} Coins</p></div>
                        <button onclick="deleteTask('${t.id}')" class="bg-red-600/20 text-red-500 px-3 py-1 rounded-lg text-[9px] font-bold uppercase">Delete</button>
                    </div>`; 
                });
            });
            listenForPayouts();
        }

        window.showData = async (type) => {
            const modal = document.getElementById('dataModal'), content = document.getElementById('modalContent');
            modal.style.display = "block"; content.innerHTML = "Loading...";
            const querySnapshot = await getDocs(collection(db, type));
            let html = "<table class='data-table'><thead><tr>";
            
            if (type === 'users') {
                // FIXED: Added "Ads Watched" to check referral status
                html += "<th>User Info</th><th>Balance</th><th>Ads Watched</th><th>Payment Info</th></tr></thead><tbody>";
                querySnapshot.forEach((doc) => { 
                    const d = doc.data(); 
                    html += `<tr>
                        <td><b>${d.username}</b><br><small>${d.email}</small></td>
                        <td class="text-green-500 font-bold">🪙 ${d.coins || 0}</td>
                        <td class="text-center font-bold ${d.totalAdsWatched >= 10 ? 'text-green-500' : 'text-yellow-500'}">
                            ${d.totalAdsWatched || 0}/10
                        </td>
                        <td>UPI: ${d.pUPI || '-'}<br>Pin: ${d.pPin || '-'}</td>
                    </tr>`; 
                });
            } else {
                html += "<th>User Name</th><th>Amount (₹)</th><th>Status</th><th>Date</th></tr></thead><tbody>";
                querySnapshot.forEach((doc) => { 
                    const d = doc.data(); 
                    html += `<tr><td>${d.username}</td><td><b class="text-green-500">₹${d.amt/100}</b></td><td class="font-bold uppercase">${d.status}</td><td>${d.date}</td></tr>`; 
                });
            }
            content.innerHTML = html + "</tbody></table>";
        };
        sync();
    </script>
</body>
</html>
