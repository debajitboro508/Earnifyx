<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earnifyx Admin | Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; min-height: 100vh; font-size: 12px; font-family: 'Outfit', sans-serif; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .data-table th, .data-table td { border: 1px solid #1e293b; padding: 10px; text-align: left; }
        .data-table th { background: #1e1b4b; color: #818cf8; text-transform: uppercase; font-size: 10px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; overflow-y: auto; padding: 20px; }
        .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 20px; padding: 24px; }
    </style>
</head>
<body class="p-6">

    <div id="dataModal" class="modal">
        <div class="flex justify-between items-center mb-4">
            <h2 id="modalTitle" class="text-xl font-bold text-indigo-400 italic">Data View</h2>
            <button onclick="document.getElementById('dataModal').style.display='none'" class="bg-red-600 px-4 py-1 rounded font-bold">CLOSE</button>
        </div>
        <div id="modalContent" class="overflow-x-auto"></div>
    </div>

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <h1 class="text-2xl font-black italic uppercase tracking-tighter">EARNIFYX <span class="text-indigo-500 text-sm">CONTROL</span></h1>
            <div class="flex gap-2">
                <button onclick="showData('users')" class="bg-indigo-600 px-4 py-2 rounded-lg font-bold uppercase text-[10px]">📊 View Users</button>
                <button onclick="showData('withdrawals')" class="bg-green-600 px-4 py-2 rounded-lg font-bold uppercase text-[10px]">💰 View Payouts</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="card border-yellow-600/30">
                <h3 class="font-bold mb-4 text-yellow-500 uppercase flex items-center gap-2">📢 Main Ad Management</h3>
                <input type="text" id="adURL" placeholder="Paste Ad Link" class="w-full bg-black p-3 rounded-xl mb-2 border border-slate-800 outline-none">
                <input type="number" id="adReward" placeholder="Reward Amount" class="w-full bg-black p-3 rounded-xl mb-4 border border-slate-800 outline-none">
                <div class="flex gap-2">
                    <button onclick="saveAd()" class="flex-1 bg-yellow-600 p-3 rounded-xl font-bold text-black uppercase">Update Ad</button>
                    <button onclick="removeAd()" class="bg-red-600/20 text-red-500 px-4 rounded-xl font-bold uppercase text-[10px]">Remove</button>
                </div>
            </div>

            <div class="card">
                <h3 class="font-bold mb-4 text-indigo-400 uppercase">➕ Add New Task</h3>
                <input type="text" id="tTitle" placeholder="Task Name" class="w-full bg-black p-3 rounded-xl mb-2 outline-none border border-slate-800">
                <input type="number" id="tReward" placeholder="Reward Coins" class="w-full bg-black p-3 rounded-xl mb-2 outline-none border border-slate-800">
                <input type="text" id="tLink" placeholder="Task Link" class="w-full bg-black p-3 rounded-xl mb-4 outline-none border border-slate-800">
                <button onclick="addTask()" class="w-full bg-indigo-600 p-3 rounded-xl font-bold uppercase">Publish Task</button>
            </div>

            <div class="card border-green-600/20">
                <h3 class="font-bold mb-4 text-green-500 uppercase">💸 Pending Payouts</h3>
                <div id="quickPayouts" class="space-y-3">
                    <p class="text-slate-500 italic text-[10px]">No pending requests...</p>
                </div>
            </div>

            <div class="card border-red-600/20">
                <h3 class="font-bold mb-4 text-red-500 uppercase">🗑️ Manage Active Tasks</h3>
                <div id="adminTaskList" class="space-y-3">
                    </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, deleteDoc, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZ8MsMjt-dhXjY-fyYYtOs-X6UmvLAV3I",
            authDomain: "earnifyx-7d00a.firebaseapp.com",
            projectId: "earnifyx-7d00a",
            storageBucket: "earnifyx-7d00a.firebasestorage.app",
            messagingSenderId: "566816125641",
            appId: "1:566816125641:web:7258a20b6fcb119b985318"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- Ad Controls ---
        window.saveAd = async () => {
            const link = document.getElementById('adURL').value;
            const reward = parseInt(document.getElementById('adReward').value);
            if(!link || !reward) return alert("Details bhariye");
            await setDoc(doc(db, "settings", "ads"), { link, reward, name: "Main Reward Ad" });
            alert("Main Ad Updated!");
        };

        window.removeAd = async () => {
            if(confirm("Kyu bhai? Ad sach mein hatana hai?")) {
                await deleteDoc(doc(db, "settings", "ads"));
                alert("Ad Removed!");
            }
        };

        // --- Task Controls ---
        window.addTask = async () => {
            const title = document.getElementById('tTitle').value;
            const reward = parseInt(document.getElementById('tReward').value);
            const link = document.getElementById('tLink').value;
            if(!title || !reward || !link) return alert("Sari fields bhariye");
            await addDoc(collection(db, "tasks"), { title, reward, link });
            alert("Task Published!");
            document.getElementById('tTitle').value = "";
            document.getElementById('tReward').value = "";
            document.getElementById('tLink').value = "";
        };

        window.deleteTask = async (id) => {
            if(confirm("Ye task delete karu?")) {
                await deleteDoc(doc(db, "tasks", id));
            }
        };

        // --- Realtime Sync ---
        function sync() {
            // Task List Sync with Delete Buttons
            onSnapshot(collection(db, "tasks"), (s) => {
                const list = document.getElementById('adminTaskList');
                list.innerHTML = "";
                s.forEach(t => {
                    const data = t.data();
                    list.innerHTML += `
                        <div class="bg-black/40 p-3 rounded-xl flex justify-between items-center border border-slate-800">
                            <div>
                                <p class="font-bold text-white text-[11px]">${data.title}</p>
                                <p class="text-indigo-400 text-[9px] uppercase font-black">+${data.reward} Coins</p>
                            </div>
                            <button onclick="deleteTask('${t.id}')" class="bg-red-600/20 text-red-500 px-3 py-1 rounded-lg text-[9px] font-bold uppercase hover:bg-red-600 hover:text-white transition">Delete</button>
                        </div>`;
                });
            });

            // Pending Payouts Sync
            onSnapshot(collection(db, "withdrawals"), (s) => {
                const list = document.getElementById('quickPayouts');
                list.innerHTML = "";
                s.forEach(d => {
                    const data = d.data();
                    if(data.status === "pending") {
                        list.innerHTML += `
                            <div class="bg-black/40 p-3 rounded-xl border border-slate-800">
                                <p class="text-green-400 font-black">₹${data.amt/100}</p>
                                <p class="text-slate-500 text-[9px] truncate">${data.email}</p>
                                <button onclick="approve('${d.id}')" class="w-full mt-2 bg-green-600 py-1 rounded-lg text-[10px] font-bold uppercase">Mark Paid</button>
                            </div>`;
                    }
                });
            });
        }

        window.approve = async (id) => {
            await updateDoc(doc(db, "withdrawals", id), { status: "approved" });
            alert("Marked as Paid!");
        };

        // --- Full Data View ---
        window.showData = async (type) => {
            const modal = document.getElementById('dataModal');
            const content = document.getElementById('modalContent');
            modal.style.display = "block";
            content.innerHTML = "Loading...";

            const querySnapshot = await getDocs(collection(db, type));
            let html = "<table class='data-table'><thead><tr>";
            
            if (type === 'users') {
                html += "<th>Name</th><th>Coins</th><th>Details</th></tr></thead><tbody>";
                querySnapshot.forEach((doc) => {
                    const d = doc.data();
                    html += `<tr><td>${d.username}</td><td>${d.coins}</td><td>Mob: ${d.pMobile || 'N/A'}<br>Pin: ${d.pPin || 'N/A'}</td></tr>`;
                });
            } else {
                html += "<th>Date</th><th>Amount</th><th>Info</th><th>Status</th></tr></thead><tbody>";
                querySnapshot.forEach((doc) => {
                    const d = doc.data();
                    html += `<tr><td>${d.date}</td><td>₹${d.amt/100}</td><td>${d.info}</td><td>${d.status}</td></tr>`;
                });
            }
            html += "</tbody></table>";
            content.innerHTML = html;
        };

        sync();
    </script>
</body>
</html>
